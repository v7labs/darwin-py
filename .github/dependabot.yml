version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns:
          - '*'
    open-pull-requests-limit: 5
    labels:
      - "github-actions-updates"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      python-requirements:
        patterns:
          - '*'
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: daily
