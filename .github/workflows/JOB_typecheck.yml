name: typecheck
run-name: Static analysis and typecheck

on:
  workflow_call:
    inputs:
      files:
        type: string
        description: "Files to lint"
        required: true

permissions:
  contents: read

jobs:
  typecheck:
    if: ${{ inputs.files != '' }}
    runs-on: ubuntu-latest
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@4d991eb9b905ef189e4c376166672c3f2f230481 # v2.18.0
      with:
        egress-policy: audit

    - name: Check out source repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Python environment
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.12"

    - name: Show filenames
      run: echo ${{ inputs.files }}

    - name: MyPy typecheck
      shell: bash
      run: |
        pip install pydantic
        bash ${{ github.workspace }}/deploy/format_lint.sh typecheck ${{ inputs.files }}
