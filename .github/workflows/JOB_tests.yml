# Run tests
name: tests
run-name: Tests

on:
  workflow_call:
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: "Run Testing OS: ${{ matrix.os }} Python: ${{ matrix.python-version }}"
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Free Disk space
        shell: bash
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo rm -rf /usr/local/lib/android  # will release about 10 GB if you don't need Android
          sudo rm -rf /usr/share/dotnet # will release about 20GB if you don't need .NET
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref }}
      - name: Install Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies with retry
        uses: nick-invision/retry@ad984534de44a9489a53aefd81eb77f87c70dc60
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: |
            bash -c "pip install poetry pytest && \
                     poetry install --no-interaction --no-root -vvv --all-extras && \
                     poetry install --no-interaction --no-root --all-extras -vvv && \
                     pip install wheel && \
                     pip install --upgrade setuptools && \
                     pip install --editable '.[test,ml,medical,dev,ocv,storage_aws,storage_gcp,storage_azure]'"

      - name: Install ffmpeg (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install ffmpeg (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: brew install ffmpeg

      - name: Install ffmpeg (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: choco install ffmpeg -y

      - name: Run pytest
        shell: bash # Stops Windows hosts from using PowerShell
        env:
          RUN_CLOUD_STORAGE_TESTS: "1"
        run: |
          python -m pytest
